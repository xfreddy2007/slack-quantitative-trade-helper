name: PR Opened → Jira Ready for Review

on:
  pull_request:
    types: [opened, ready_for_review]
    branches: [dev]

permissions:
  contents: read

jobs:
  transition-jira:
    # Only run for feature branches opened by Copilot (or anyone targeting dev)
    if: startsWith(github.head_ref, 'feature/')
    runs-on: ubuntu-latest

    steps:
      - name: Transition Jira ticket to Ready for Review
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import base64, json, os, re, sys, urllib.request, urllib.error

          JIRA_URL   = os.environ["JIRA_URL"]
          JIRA_EMAIL = os.environ["JIRA_EMAIL"]
          JIRA_TOKEN = os.environ["JIRA_API_TOKEN"]
          GH_TOKEN   = os.environ["GH_TOKEN"]
          BRANCH     = os.environ["BRANCH"]
          PR_TITLE   = os.environ["PR_TITLE"]
          PR_URL     = os.environ["PR_URL"]
          REPO       = os.environ["REPO"]

          def auth():
              return "Basic " + base64.b64encode(f"{JIRA_EMAIL}:{JIRA_TOKEN}".encode()).decode()

          def jira(method, path, body=None):
              url = f"{JIRA_URL}/rest/api/3{path}"
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(
                  url, data=data,
                  headers={"Authorization": auth(), "Content-Type": "application/json", "Accept": "application/json"},
                  method=method,
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read()) if r.length != 0 else {}

          def gh_get(path):
              req = urllib.request.Request(
                  f"https://api.github.com{path}",
                  headers={"Authorization": f"Bearer {GH_TOKEN}", "Accept": "application/vnd.github+json"},
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          # Extract task ID from branch name: feature/T1.1.1-slug → T1.1.1
          match = re.search(r'feature/(T\d+\.\d+\.\d+)', BRANCH)
          if not match:
              print(f"Branch '{BRANCH}' has no T{{N}}.{{M}}.{{P}} pattern — skipping.")
              sys.exit(0)
          task_id = match.group(1)
          print(f"Task ID: {task_id}")

          # Look up Jira key from GitHub issue body (avoids Jira JQL search)
          # Automation 1 creates an issue with body containing "**Jira:** FREDDY-NN"
          issues = gh_get(f"/repos/{REPO}/issues?labels=copilot&state=open&per_page=50")
          print(f"Found {len(issues)} open copilot issue(s)")
          issue_key = None
          for issue in issues:
              title = issue.get("title", "")
              body  = issue.get("body", "") or ""
              print(f"  Checking: '{title}' | body snippet: {repr(body[:80])}")
              if f"[{task_id}]" in title:
                  m = re.search(r'\*\*Jira[^:]*:\*\*\s*([\w]+-\d+)', body)
                  print(f"  Title match! Regex result: {m.group(1) if m else 'NO MATCH'}")
                  if m:
                      issue_key = m.group(1)
                      break
          if not issue_key:
              print(f"No GitHub issue found for [{task_id}] with a Jira key — skipping.")
              sys.exit(0)
          print(f"Jira key: {issue_key}")

          # Get available transitions
          tr_data = jira("GET", f"/issue/{issue_key}/transitions")
          transitions = tr_data.get("transitions", [])
          print("Available transitions:", [t["name"] for t in transitions])

          # Pick best match: prefer "Ready for Review" variants, fall back to "In Review" or "Done"
          priority = ["ready for review", "in review", "code review", "review", "done"]
          chosen = None
          for target in priority:
              for t in transitions:
                  if target in t["name"].lower():
                      chosen = t
                      break
              if chosen:
                  break

          if not chosen:
              print("No suitable transition found — skipping.")
              sys.exit(0)

          print(f"Transitioning {issue_key} → '{chosen['name']}' (id={chosen['id']})")
          jira("POST", f"/issue/{issue_key}/transitions", {"transition": {"id": chosen["id"]}})

          # Add a comment linking the PR
          comment_body = {
              "body": {
                  "type": "doc", "version": 1,
                  "content": [{
                      "type": "paragraph",
                      "content": [
                          {"type": "text", "text": "PR opened by Copilot: "},
                          {"type": "text", "text": PR_URL, "marks": [{"type": "link", "attrs": {"href": PR_URL}}]},
                          {"type": "text", "text": f"\n{PR_TITLE}"},
                      ]
                  }]
              }
          }
          jira("POST", f"/issue/{issue_key}/comment", comment_body)
          print(f"Done. {issue_key} is now '{chosen['name']}' with PR comment added.")
          EOF
