name: PR Opened → Jira Ready for Review

on:
  # Human-opened PRs (pull_request event works for non-bot actors)
  pull_request:
    types: [opened, ready_for_review]
    branches: [dev]
  # Bot-opened PRs: GITHUB_TOKEN doesn't trigger pull_request events,
  # so we fire on workflow_run completion of the two workflows that open PRs
  workflow_run:
    workflows:
      - "Jira Ticket → aider Implementation"
      - "aider Clarification Answered → Continue Implementation"
      - "Feature Branch → Open PR"
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  transition-jira:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && startsWith(github.head_ref, 'feature/')) ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'feature/'))

    steps:
      - name: Resolve PR context
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            PR_NUMBER=$(gh pr list \
              --head "$BRANCH" \
              --base dev \
              --state open \
              --repo "${{ github.repository }}" \
              --json number \
              --jq '.[0].number // empty' 2>/dev/null || true)
            if [ -z "$PR_NUMBER" ]; then
              echo "No open PR found for branch $BRANCH — skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            PR_URL=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json url --jq '.url')
            PR_TITLE=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json title --jq '.title')
          else
            BRANCH="${{ github.head_ref }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
            PR_URL="${{ github.event.pull_request.html_url }}"
            PR_TITLE="${{ github.event.pull_request.title }}"
          fi
          echo "branch=$BRANCH"     >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL"     >> "$GITHUB_OUTPUT"
          echo "pr_title=$PR_TITLE" >> "$GITHUB_OUTPUT"
          echo "skip=false"         >> "$GITHUB_OUTPUT"

      - name: Transition Jira ticket to Ready for Review
        if: steps.ctx.outputs.skip != 'true'
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_WEBHOOK_PR_OPENED: ${{ secrets.JIRA_WEBHOOK_PR_OPENED }}
          JIRA_WEBHOOK_PR_OPENED_TOKEN: ${{ secrets.JIRA_WEBHOOK_PR_OPENED_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.ctx.outputs.branch }}
          PR_TITLE: ${{ steps.ctx.outputs.pr_title }}
          PR_URL: ${{ steps.ctx.outputs.pr_url }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import base64, json, os, re, sys, urllib.request, urllib.error

          JIRA_URL   = os.environ["JIRA_URL"]
          JIRA_EMAIL = os.environ["JIRA_EMAIL"]
          JIRA_TOKEN = os.environ["JIRA_API_TOKEN"]
          GH_TOKEN   = os.environ["GH_TOKEN"]
          BRANCH     = os.environ["BRANCH"]
          PR_TITLE   = os.environ["PR_TITLE"]
          PR_URL     = os.environ["PR_URL"]
          REPO       = os.environ["REPO"]

          def auth():
              return "Basic " + base64.b64encode(f"{JIRA_EMAIL}:{JIRA_TOKEN}".encode()).decode()

          def jira(method, path, body=None):
              url = f"{JIRA_URL}/rest/api/3{path}"
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(
                  url, data=data,
                  headers={"Authorization": auth(), "Content-Type": "application/json", "Accept": "application/json"},
                  method=method,
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read()) if r.length != 0 else {}

          def gh_get(path):
              req = urllib.request.Request(
                  f"https://api.github.com{path}",
                  headers={"Authorization": f"Bearer {GH_TOKEN}", "Accept": "application/vnd.github+json"},
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          match = re.search(r'feature/(T\d+\.\d+\.\d+)', BRANCH)
          if not match:
              print(f"Branch '{BRANCH}' has no T{{N}}.{{M}}.{{P}} pattern — skipping.")
              sys.exit(0)
          task_id = match.group(1)
          print(f"Task ID: {task_id}")

          issues = gh_get(f"/repos/{REPO}/issues?labels=aider&state=open&per_page=50")
          issue_key = None
          for issue in issues:
              title = issue.get("title", "")
              body  = issue.get("body", "") or ""
              if f"[{task_id}]" in title:
                  m = re.search(r'\*\*Jira[^:]*:\*\*\s*([\w]+-\d+)', body)
                  if m:
                      issue_key = m.group(1)
                      break
          if not issue_key:
              print(f"No GitHub issue found for [{task_id}] with a Jira key — skipping.")
              sys.exit(0)
          print(f"Jira key: {issue_key}")

          tr_data = jira("GET", f"/issue/{issue_key}/transitions")
          transitions = tr_data.get("transitions", [])
          priority = ["ready for review", "in review", "code review", "review", "done"]
          chosen = None
          for target in priority:
              for t in transitions:
                  if target in t["name"].lower():
                      chosen = t
                      break
              if chosen:
                  break

          if not chosen:
              print("No suitable transition found — skipping.")
              sys.exit(0)

          print(f"Transitioning {issue_key} → '{chosen['name']}' (id={chosen['id']})")
          jira("POST", f"/issue/{issue_key}/transitions", {"transition": {"id": chosen["id"]}})

          WEBHOOK_URL = os.environ["JIRA_WEBHOOK_PR_OPENED"]
          WEBHOOK_TOKEN = os.environ["JIRA_WEBHOOK_PR_OPENED_TOKEN"]
          webhook_payload = json.dumps({"issues": [issue_key], "prUrl": PR_URL, "prTitle": PR_TITLE}).encode()
          req = urllib.request.Request(
              WEBHOOK_URL,
              data=webhook_payload,
              headers={"Content-Type": "application/json", "Authorization": f"Bearer {WEBHOOK_TOKEN}"},
              method="POST",
          )
          with urllib.request.urlopen(req):
              pass
          print(f"Done. {issue_key} → '{chosen['name']}' with PR comment.")
          EOF

