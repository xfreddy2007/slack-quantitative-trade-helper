name: PR Merged → Jira Done

on:
  pull_request:
    types: [closed]
    branches: [dev]

permissions:
  contents: read

jobs:
  close-jira:
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'feature/')
    runs-on: ubuntu-latest

    steps:
      - name: Transition Jira ticket to Done
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_WEBHOOK_PR_MERGED: ${{ secrets.JIRA_WEBHOOK_PR_MERGED }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import base64, json, os, re, sys, urllib.request

          JIRA_URL   = os.environ["JIRA_URL"]
          JIRA_EMAIL = os.environ["JIRA_EMAIL"]
          JIRA_TOKEN = os.environ["JIRA_API_TOKEN"]
          GH_TOKEN   = os.environ["GH_TOKEN"]
          BRANCH     = os.environ["BRANCH"]
          PR_TITLE   = os.environ["PR_TITLE"]
          PR_URL     = os.environ["PR_URL"]
          MERGED_BY  = os.environ["MERGED_BY"]
          REPO       = os.environ["REPO"]

          def auth():
              return "Basic " + base64.b64encode(f"{JIRA_EMAIL}:{JIRA_TOKEN}".encode()).decode()

          def jira(method, path, body=None):
              url = f"{JIRA_URL}/rest/api/3{path}"
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(
                  url, data=data,
                  headers={"Authorization": auth(), "Content-Type": "application/json", "Accept": "application/json"},
                  method=method,
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read()) if r.length != 0 else {}

          def gh_get(path):
              req = urllib.request.Request(
                  f"https://api.github.com{path}",
                  headers={"Authorization": f"Bearer {GH_TOKEN}", "Accept": "application/vnd.github+json"},
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          match = re.search(r'feature/(T\d+\.\d+\.\d+)', BRANCH)
          if not match:
              print(f"Branch '{BRANCH}' has no T{{N}}.{{M}}.{{P}} pattern — skipping.")
              sys.exit(0)
          task_id = match.group(1)
          print(f"Task ID: {task_id}")

          gh_issues = gh_get(f"/repos/{REPO}/issues?labels=aider&state=all&per_page=50")
          issue_key = None
          for iss in gh_issues:
              if f"[{task_id}]" in (iss.get("title") or ""):
                  m = re.search(r'\*\*Jira[^:]*:\*\*\s*([\w]+-\d+)', iss.get("body") or "")
                  if m:
                      issue_key = m.group(1)
                      break
          if not issue_key:
              print(f"No GitHub issue found for [{task_id}] with a Jira key — skipping.")
              sys.exit(0)
          print(f"Jira key: {issue_key}")

          tr_data = jira("GET", f"/issue/{issue_key}/transitions")
          transitions = tr_data.get("transitions", [])
          print("Available transitions:", [t["name"] for t in transitions])

          chosen = next((t for t in transitions if t["name"].lower() == "done"), None)
          if not chosen:
              chosen = next((t for t in transitions if "done" in t["name"].lower()), None)
          if not chosen:
              print("No 'Done' transition found — skipping.")
              sys.exit(0)

          print(f"Transitioning {issue_key} → '{chosen['name']}' (id={chosen['id']})")
          jira("POST", f"/issue/{issue_key}/transitions", {"transition": {"id": chosen["id"]}})

          WEBHOOK_URL = os.environ["JIRA_WEBHOOK_PR_MERGED"]
          webhook_payload = json.dumps({"issues": [issue_key], "prUrl": PR_URL, "prTitle": PR_TITLE, "mergedBy": MERGED_BY}).encode()
          req = urllib.request.Request(
              WEBHOOK_URL,
              data=webhook_payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req):
              pass
          print(f"Done. {issue_key} closed with merge comment.")
          EOF
