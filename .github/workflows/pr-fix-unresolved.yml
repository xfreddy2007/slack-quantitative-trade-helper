name: PR Review → Fix Unresolved Threads via aider

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-unresolved:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'pull_request_review' &&
       startsWith(github.event.pull_request.head.ref, 'feature/') &&
       github.event.pull_request.base.ref == 'dev')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Resolve PR number
        id: ctx
        run: |
          HEAD="${{ github.event.pull_request.head.ref }}"
          BASE="${{ github.event.pull_request.base.ref }}"
          if [[ "$HEAD" =~ ^feature/ ]] && [ "$BASE" = "dev" ]; then
            echo "pr=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "pr=" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch unresolved threads
        id: threads
        if: steps.ctx.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/fix_unresolved_agent.py \
            --repo "${{ github.repository }}" \
            --pr  "${{ steps.ctx.outputs.pr }}" \
            --output /tmp/aider_fix_prompt.txt
        continue-on-error: true  # exit 1 = threads found

      - name: Run aider to fix threads
        if: steps.ctx.outputs.pr != '' && steps.threads.outcome == 'failure'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          BRANCH=$(cat /tmp/fix_branch.txt)
          git config user.name "aider[bot]"
          git config user.email "aider@github-actions"
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

          printf 'Fix all unresolved review comments below. Do NOT ask for clarification. Commit all fixes now.\n\n%s' \
            "$(cat /tmp/aider_fix_prompt.txt)" > /tmp/full_prompt.txt

          uvx --from aider-chat aider \
            --model claude-sonnet-4-6 \
            --message "$(cat /tmp/full_prompt.txt)" \
            --yes \
            --auto-commits \
            --no-check-update \
            --no-gitignore

          git push origin "$BRANCH"
          echo "Fixes pushed to $BRANCH"

      - name: Resolve review threads
        if: steps.ctx.outputs.pr != '' && steps.threads.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request

          GH_TOKEN = os.environ["GH_TOKEN"]

          RESOLVE_MUTATION = """
          mutation($threadId: ID!) {
            resolveReviewThread(input: {threadId: $threadId}) {
              thread { id isResolved }
            }
          }
          """

          try:
              with open("/tmp/thread_ids.txt") as f:
                  thread_ids = [l.strip() for l in f if l.strip()]
          except FileNotFoundError:
              print("No thread_ids.txt — skipping.")
              exit(0)

          def graphql(query, variables):
              body = json.dumps({"query": query, "variables": variables}).encode()
              req = urllib.request.Request(
                  "https://api.github.com/graphql", data=body,
                  headers={"Authorization": f"Bearer {GH_TOKEN}", "Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          for tid in thread_ids:
              result = graphql(RESOLVE_MUTATION, {"threadId": tid})
              if result.get("errors"):
                  print(f"Failed to resolve {tid}: {result['errors']}")
              else:
                  print(f"Resolved {tid}")
          print(f"Done — resolved {len(thread_ids)} threads.")
          EOF

      - name: Request Copilot re-review
        if: steps.ctx.outputs.pr != '' && steps.threads.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            "/repos/${{ github.repository }}/pulls/${{ steps.ctx.outputs.pr }}/copilot-review-requests" \
            2>&1 || echo "Copilot re-review request failed (non-fatal)"
          echo "Copilot re-review requested for PR #${{ steps.ctx.outputs.pr }}"
