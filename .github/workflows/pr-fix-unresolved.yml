name: PR Review → Fix Unresolved Threads via aider

on:
  # Human reviews: trigger directly, no approval needed
  pull_request_review:
    types: [submitted]
  # Copilot reviews: dispatched by pr-to-jira-review.yml after polling
  repository_dispatch:
    types: [check-pr-threads]

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  fix-unresolved:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Resolve PR number from event type
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "pr=${{ github.event.client_payload.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            HEAD="${{ github.event.pull_request.head.ref }}"
            BASE="${{ github.event.pull_request.base.ref }}"
            if [[ ! "$HEAD" =~ ^feature/ ]] || [ "$BASE" != "dev" ]; then
              echo "pr=" >> "$GITHUB_OUTPUT"
            else
              echo "pr=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Check unresolved threads
        id: threads
        if: steps.ctx.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/fix_unresolved_agent.py \
            --repo "${{ github.repository }}" \
            --pr "${{ steps.ctx.outputs.pr }}" \
            --prompt-output /tmp/aider_fix_prompt.txt
        continue-on-error: true  # exit 1 = threads found → run aider; exit 0 = all resolved

      - name: Checkout feature branch and run aider fixes
        if: steps.ctx.outputs.pr != '' && steps.threads.outcome == 'failure'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          BRANCH=$(cat /tmp/fix_branch.txt)
          git config user.name "aider[bot]"
          git config user.email "aider@github-actions"
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

          PROMPT="Fix these unresolved review comments. Do NOT ask for clarification. Implement all fixes now.

$(cat /tmp/aider_fix_prompt.txt)"

          uvx --from aider-chat aider \
            --model claude-sonnet-4-6 \
            --message "$PROMPT" \
            --yes \
            --auto-commits \
            --no-check-update \
            --no-gitignore

          git push origin "$BRANCH"
          echo "aider fixes pushed to $BRANCH"
