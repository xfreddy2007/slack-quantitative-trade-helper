name: PR Review → Fix Unresolved Threads via aider

on:
  pull_request_review:
    types: [submitted]
  repository_dispatch:
    types: [check-pr-threads]

permissions:
  contents: write
  pull-requests: read

jobs:
  fix-unresolved:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Resolve PR number
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "pr=${{ github.event.client_payload.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            HEAD="${{ github.event.pull_request.head.ref }}"
            BASE="${{ github.event.pull_request.base.ref }}"
            if [[ "$HEAD" =~ ^feature/ ]] && [ "$BASE" = "dev" ]; then
              echo "pr=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            else
              echo "pr=" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Fetch unresolved threads
        id: threads
        if: steps.ctx.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/fix_unresolved_agent.py \
            --repo "${{ github.repository }}" \
            --pr  "${{ steps.ctx.outputs.pr }}" \
            --output /tmp/aider_fix_prompt.txt
        continue-on-error: true  # exit 1 = threads found

      - name: Run aider to fix threads
        if: steps.ctx.outputs.pr != '' && steps.threads.outcome == 'failure'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          BRANCH=$(cat /tmp/fix_branch.txt)
          git config user.name "aider[bot]"
          git config user.email "aider@github-actions"
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

          printf 'Fix all unresolved review comments below. Do NOT ask for clarification. Commit all fixes now.\n\n%s' \
            "$(cat /tmp/aider_fix_prompt.txt)" > /tmp/full_prompt.txt

          uvx --from aider-chat aider \
            --model claude-sonnet-4-6 \
            --message "$(cat /tmp/full_prompt.txt)" \
            --yes \
            --auto-commits \
            --no-check-update \
            --no-gitignore

          git push origin "$BRANCH"
          echo "Fixes pushed to $BRANCH"
