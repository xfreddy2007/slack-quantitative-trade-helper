name: aider Clarification Answered → Continue Implementation

on:
  repository_dispatch:
    types: [aider-clarification-answered]

# Triggered by Jira Automation when user adds a comment answering aider's question.
# Payload: {"issue_key": "FREDDY-16", "answer": "<comment body>"}

permissions:
  contents: write
  pull-requests: write

jobs:
  continue:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Find feature branch for this issue
        id: find-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re, urllib.request

          GH_TOKEN  = os.environ["GH_TOKEN"]
          ISSUE_KEY = os.environ["ISSUE_KEY"]
          REPO      = os.environ["GITHUB_REPOSITORY"]

          def gh(path):
              req = urllib.request.Request(
                  f"https://api.github.com{path}",
                  headers={"Authorization": f"Bearer {GH_TOKEN}", "Accept": "application/vnd.github+json"},
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          # Find open branch with state file for this issue key
          branches = gh(f"/repos/{REPO}/git/refs/heads")
          branch = ""
          github_issue_number = ""
          for b in branches:
              ref = b["ref"].replace("refs/heads/", "")
              if ref.startswith("feature/"):
                  try:
                      content = gh(f"/repos/{REPO}/contents/.aider_state.json?ref={ref}")
                      import base64
                      state = json.loads(base64.b64decode(content["content"]).decode())
                      if state.get("issue_key") == ISSUE_KEY:
                          branch = ref
                          github_issue_number = str(state.get("github_issue_number", ""))
                          break
                  except Exception:
                      pass

          if not branch:
              print(f"No feature branch found with aider state for {ISSUE_KEY}")
              exit(1)

          print(f"Found branch: {branch}, GitHub issue: {github_issue_number}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"branch={branch}\n")
              f.write(f"github_issue_number={github_issue_number}\n")
          PYEOF

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.find-branch.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Configure git
        run: |
          git config user.name "aider[bot]"
          git config user.email "aider@github-actions"
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Fetch latest user answer from Jira
        id: answer
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
        run: |
          python3 - <<'PYEOF'
          import base64, json, os, urllib.request

          JIRA_URL   = os.environ["JIRA_URL"]
          auth = "Basic " + base64.b64encode(
              f"{os.environ['JIRA_EMAIL']}:{os.environ['JIRA_API_TOKEN']}".encode()
          ).decode()
          key = os.environ["ISSUE_KEY"]

          req = urllib.request.Request(
              f"{JIRA_URL}/rest/api/3/issue/{key}/comment?orderBy=-created&maxResults=20",
              headers={"Authorization": auth, "Accept": "application/json"},
          )
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())

          def extract_text(node):
              if isinstance(node, list):
                  return "".join(extract_text(n) for n in node)
              if isinstance(node, dict):
                  if node.get("type") == "text":
                      return node.get("text", "")
                  return extract_text(node.get("content", []))
              return ""

          # Find the latest comment NOT from automation (not containing [aider-question])
          answer = ""
          for comment in data.get("comments", []):
              text = extract_text(comment.get("body", {}))
              if "[aider-question]" not in text:
                  answer = text.strip()
                  break

          if not answer:
              print("No user answer found in comments — skipping.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("answer=\n")
          else:
              print(f"Found answer: {answer[:100]}…")
              with open("/tmp/jira_answer.txt", "w") as f:
                  f.write(answer)
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("answer=found\n")
          PYEOF

      - name: Continue aider with user answer
        id: aider
        if: steps.answer.outputs.answer == 'found'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          uv run --with aider-chat scripts/aider_agent.py continue \
            --issue-key "${{ github.event.client_payload.issue_key }}" \
            --answer "$(cat /tmp/jira_answer.txt)"
        continue-on-error: true

      - name: Push branch — still waiting for clarification
        if: steps.aider.outcome == 'failure'
        run: |
          git push origin "${{ steps.find-branch.outputs.branch }}"
          echo "Another question posted to Jira. Waiting for user response."

      - name: Push branch and open PR
        if: steps.aider.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
        run: |
          BRANCH="${{ steps.find-branch.outputs.branch }}"
          ISSUE_NUMBER="${{ steps.find-branch.outputs.github_issue_number }}"
          git push origin "$BRANCH"

          TITLE=$(gh api "/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}" --jq '.title')
          PR_BODY=$(printf 'Closes #%s\n\nImplemented by aider + Claude Sonnet 4.6 from Jira ticket %s.' \
            "$ISSUE_NUMBER" "$ISSUE_KEY")

          PR_URL=$(gh pr create \
            --title "$TITLE" \
            --body "$PR_BODY" \
            --base dev \
            --head "$BRANCH" \
            --label "aider" \
            --repo "${{ github.repository }}")

          echo "PR opened: $PR_URL"
