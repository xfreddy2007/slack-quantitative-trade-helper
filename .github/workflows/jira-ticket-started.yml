name: Jira Ticket → Copilot

on:
  repository_dispatch:
    types: [jira-ticket-started]

permissions:
  issues: write
  contents: read

jobs:
  pm-to-copilot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Run PM agent
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uv run --with anthropic scripts/pm_agent.py \
            --issue-key "${{ github.event.client_payload.issue_key }}" \
            --output /tmp/issue.json

      - name: Ensure copilot label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "copilot" \
            --color "0075ca" \
            --description "Assigned to Copilot coding agent" \
            --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Create issue and assign Copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(jq -r '.title' /tmp/issue.json)
          BODY=$(jq -r '.body' /tmp/issue.json)

          ISSUE_URL=$(gh issue create \
            --title "$TITLE" \
            --body "$BODY" \
            --label "copilot" \
            --repo "${{ github.repository }}")

          ISSUE_NUMBER=$(basename "$ISSUE_URL")
          echo "Created issue #$ISSUE_NUMBER: $ISSUE_URL"

          # Assign Copilot coding agent via REST API
          curl -s -L \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/assignees" \
            -d '{"assignees":["copilot"]}'

          echo "Assigned @copilot to issue #$ISSUE_NUMBER"
