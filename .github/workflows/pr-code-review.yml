name: PR Opened → Code Review + Jira In Review

on:
  pull_request:
    types: [opened, ready_for_review]
    branches: [dev]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  code-review:
    if: startsWith(github.head_ref, 'feature/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Run code review agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run --with anthropic scripts/code_review_agent.py \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}"

      - name: Transition Jira ticket to In Review
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          BRANCH: ${{ github.head_ref }}
        run: |
          python3 - <<'EOF'
          import base64, json, os, re, sys, urllib.request, urllib.error

          JIRA_URL   = os.environ["JIRA_URL"]
          JIRA_EMAIL = os.environ["JIRA_EMAIL"]
          JIRA_TOKEN = os.environ["JIRA_API_TOKEN"]
          BRANCH     = os.environ["BRANCH"]

          def auth():
              return "Basic " + base64.b64encode(f"{JIRA_EMAIL}:{JIRA_TOKEN}".encode()).decode()

          def jira(method, path, body=None):
              url = f"{JIRA_URL}/rest/api/3{path}"
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(
                  url, data=data,
                  headers={"Authorization": auth(), "Content-Type": "application/json", "Accept": "application/json"},
                  method=method,
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read()) if r.length != 0 else {}

          match = re.search(r'feature/(T\d+\.\d+\.\d+)', BRANCH)
          if not match:
              print(f"Branch '{BRANCH}' has no T{{N}}.{{M}}.{{P}} pattern — skipping.")
              sys.exit(0)
          task_id = match.group(1)
          print(f"Task ID: {task_id}")

          search = jira("GET", f'/search?jql=summary+%7E+%22%5B{task_id}%5D%22&maxResults=1&fields=summary,status')
          issues = search.get("issues", [])
          if not issues:
              print(f"No Jira issue found matching '[{task_id}]' — skipping.")
              sys.exit(0)

          issue_key = issues[0]["key"]
          current_status = issues[0]["fields"]["status"]["name"]
          print(f"Found: {issue_key}  (status: {current_status})")

          tr_data = jira("GET", f"/issue/{issue_key}/transitions")
          transitions = tr_data.get("transitions", [])
          print("Available transitions:", [t["name"] for t in transitions])

          # "In Review" → "Code Review" → "In Progress" (fallback if already past Ready for Review)
          priority = ["in review", "code review", "under review", "reviewing"]
          chosen = None
          for target in priority:
              for t in transitions:
                  if target in t["name"].lower():
                      chosen = t
                      break
              if chosen:
                  break

          if not chosen:
              print("No 'In Review' transition found — skipping Jira transition.")
              sys.exit(0)

          print(f"Transitioning {issue_key} → '{chosen['name']}' (id={chosen['id']})")
          jira("POST", f"/issue/{issue_key}/transitions", {"transition": {"id": chosen["id"]}})
          print("Done.")
          EOF
