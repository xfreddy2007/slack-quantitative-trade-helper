services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: investment
      POSTGRES_PASSWORD: investment
      POSTGRES_DB: investment_helper
    ports:
      - "5433:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investment -d investment_helper"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
