services:
  postgres:
    image: postgres:16
    container_name: freddy_postgres
    environment:
      POSTGRES_USER: freddy
      POSTGRES_PASSWORD: freddy
      POSTGRES_DB: freddy_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freddy -d freddy_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
