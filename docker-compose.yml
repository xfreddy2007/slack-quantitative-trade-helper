version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-investment_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-investment_password}
      POSTGRES_DB: ${POSTGRES_DB:-investment_helper}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-investment_user} -d ${POSTGRES_DB:-investment_helper}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
