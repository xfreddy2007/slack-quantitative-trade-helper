version = 1
requires-python = ">=3.12"

[[package]]
name = "quant-python"
version = "0.1.0"
source = { editable = "." }
dependencies = [
  { name = "pydantic" },
  { name = "polars" },
]

[package.dev-dependencies]
dev = [
  { name = "pytest" },
  { name = "pytest-cov" },
]

[package.metadata]
requires-dist = [
  { name = "pydantic", specifier = ">=2" },
  { name = "polars", specifier = ">=1.0.0" },
]

[package.metadata.requires-dev]
dev = [
  { name = "pytest", specifier = ">=8.0.0" },
  { name = "pytest-cov", specifier = ">=5.0.0" },
]
