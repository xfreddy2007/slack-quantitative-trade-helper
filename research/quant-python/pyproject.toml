[project]
name = "quant-python"
version = "0.1.0"
description = "Python quant/ML core for the Slack quantitative trade helper"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
    "polars>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"

[tool.uv]
dev-dependencies = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/quant_python"]
